trigger:
  branches:
    include:
      - PlayWrightLearn  # Triggers only on changes to this branch

pool:
  name: Default  # Uses your self-hosted agent pool

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: 'lts/*'
    displayName: 'Install Node.js'

  - checkout: self
    clean: true

  - script: |
      npm ci
    displayName: 'Install dependencies'

  - script: |
      npx playwright install --with-deps
    displayName: 'Install Playwright Browsers'

  - script: |
      npx playwright test --reporter=html --verbose
    displayName: 'Run Playwright Tests'

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'playwright-report'
      artifactName: 'playwright-html-report'
      publishLocation: 'pipeline'
    displayName: '📦 Upload Playwright HTML Report'
